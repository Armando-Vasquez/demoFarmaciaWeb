<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Categoría - Farmacia Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html"><i class="bi bi-heart-pulse-fill"></i> Sistema Farmacia</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="productos.html"><i class="bi bi-box-seam"></i> Productos</a></li>
                    <li class="nav-item"><a class="nav-link" href="categorias.html"><i class="bi bi-tags"></i> Categorías</a></li>
                    <li class="nav-item"><a class="nav-link" href="proveedores.html"><i class="bi bi-truck"></i> Proveedores</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="m-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-success text-dark"><h4 class="mb-0"><i class="bi bi-pencil-square"></i> Editar Categoría</h4></div>
                    <div class="card-body">
                        <form id="categoriaForm">
                            <div class="mb-3">
                                <label for="cod_categoria" class="form-label">Código</label>
                                <input type="text" class="form-control" id="cod_categoria" disabled>
                                <small class="text-muted">El código no se puede modificar</small>
                            </div>
                            <div class="mb-3">
                                <label for="nombre_categorias" class="form-label">Nombre <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="nombre_categorias" name="nombre_categorias" required>
                            </div>
                            <div class="mb-3">
                                <label for="desc_categ" class="form-label">Descripción <span class="text-danger">*</span></label>
                                <textarea class="form-control" id="desc_categ" name="desc_categ" rows="3" required></textarea>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success"><i class="bi bi-save"></i> Actualizar</button>
                                <a href="categorias.html" class="btn btn-secondary"><i class="bi bi-x-circle"></i> Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="bg-light text-center py-3 mt-auto"><h6>Programadores S.A de C.V</h6></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/app.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const cod = params.get('cod');
        if (!cod) { window.location.href = 'categorias.html'; }
        const categoria = DemoApp.getCategoria(cod);
        if (!categoria) { DemoApp.showAlert('error', '¡Error!', 'Categoría no encontrada'); setTimeout(() => { window.location.href = 'categorias.html'; }, 1500); }
        else {
            document.getElementById('cod_categoria').value = categoria.cod_categoria;
            document.getElementById('nombre_categorias').value = categoria.nombre_categorias;
            document.getElementById('desc_categ').value = categoria.desc_categ;
        }
        document.getElementById('categoriaForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = { nombre_categorias: document.getElementById('nombre_categorias').value, desc_categ: document.getElementById('desc_categ').value };
            const result = DemoApp.actualizarCategoria(cod, data);
            if (result.success) { DemoApp.showToast('success', '¡Éxito!', 'Categoría actualizada exitosamente'); setTimeout(() => { window.location.href = 'categorias.html'; }, 1000); }
            else { DemoApp.showAlert('error', '¡Error!', 'Error al actualizar la categoría: ' + result.mensaje); }
        });
    </script>
</body>
</html>
