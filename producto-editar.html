<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Producto - Farmacia Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html"><i class="bi bi-heart-pulse-fill"></i> Sistema Farmacia</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="productos.html"><i class="bi bi-box-seam"></i> Productos</a></li>
                    <li class="nav-item"><a class="nav-link" href="categorias.html"><i class="bi bi-tags"></i> Categorías</a></li>
                    <li class="nav-item"><a class="nav-link" href="proveedores.html"><i class="bi bi-truck"></i> Proveedores</a></li>
                </ul>
            </div>
            <div class="d-flex align-items-center">
                <span class="text-white me-3"><i class="bi bi-person-circle"></i> <span id="userName"></span></span>
                <button class="btn btn-outline-light" onclick="cerrarSesion()"><i class="bi bi-box-arrow-right"></i> Cerrar Sesión</button>
            </div>
        </div>
    </nav>
    <div class="m-4">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card">
                    <div class="card-header bg-warning text-dark"><h4 class="mb-0"><i class="bi bi-pencil-square"></i> Editar Producto</h4></div>
                    <div class="card-body">
                        <form id="productoForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="cod_producto" class="form-label">Código</label>
                                        <input type="text" class="form-control" id="cod_producto" disabled>
                                        <small class="text-muted">El código no se puede modificar</small>
                                    </div>
                                    <div class="mb-3">
                                        <label for="cod_proveedor" class="form-label">Proveedor <span class="text-danger">*</span></label>
                                        <select class="form-select" id="cod_proveedor" name="cod_proveedor" required></select>
                                    </div>
                                    <div class="mb-3">
                                        <label for="cod_categoria" class="form-label">Categoría <span class="text-danger">*</span></label>
                                        <select class="form-select" id="cod_categoria" name="cod_categoria" required></select>
                                    </div>
                                    <div class="mb-3">
                                        <label for="nombre_producto" class="form-label">Nombre <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" id="nombre_producto" name="nombre_producto" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="desc_prod" class="form-label">Descripción <span class="text-danger">*</span></label>
                                        <textarea class="form-control" id="desc_prod" name="desc_prod" rows="3" required></textarea>
                                    </div>
                                    <div class="mb-3">
                                        <label for="cantidad_prod" class="form-label">Cantidad <span class="text-danger">*</span></label>
                                        <input type="number" class="form-control" id="cantidad_prod" name="cantidad_prod" min="0" max="250" required>
                                        <small class="text-muted">Cantidad permitida: 0 - 250 productos</small>
                                    </div>
                                    <div class="mb-3">
                                        <label for="precio" class="form-label">Precio <span class="text-danger">*</span></label>
                                        <input type="number" step="0.01" class="form-control" id="precio" name="precio" min="0" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="estado" class="form-label">Estado <span class="text-danger">*</span></label>
                                        <select class="form-select" id="estado" name="estado" required>
                                            <option value="1">Activo</option>
                                            <option value="0">Inactivo</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="d-flex gap-2 mt-3">
                                <button type="submit" class="btn btn-warning"><i class="bi bi-save"></i> Actualizar</button>
                                <a href="productos.html" class="btn btn-secondary"><i class="bi bi-x-circle"></i> Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="bg-light text-center py-3 mt-auto"><h6>Programadores S.A de C.V</h6></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/app.js"></script>
    <script>
        DemoApp.requireAuth();
        document.getElementById('userName').textContent = DemoApp.getCurrentUser() || 'Usuario';
        const params = new URLSearchParams(window.location.search);
        const cod = params.get('cod');
        if (!cod) { window.location.href = 'productos.html'; }
        const producto = DemoApp.getProducto(cod);
        if (!producto) { DemoApp.showAlert('error', '¡Error!', 'Producto no encontrado'); setTimeout(() => { window.location.href = 'productos.html'; }, 1500); }
        const proveedores = DemoApp.getProveedores();
        const categorias = DemoApp.getCategorias();
        function llenarSelect(id, items, valueKey, labelKey, selected) {
            const sel = document.getElementById(id);
            sel.innerHTML = '<option value="">Seleccione</option>';
            items.forEach(item => {
                const selAttr = item[valueKey] === selected ? 'selected' : '';
                sel.innerHTML += `<option value="${item[valueKey]}" ${selAttr}>${item[valueKey]} - ${item[labelKey]}</option>`;
            });
        }
        if (producto) {
            document.getElementById('cod_producto').value = producto.cod_producto;
            document.getElementById('nombre_producto').value = producto.nombre_producto;
            document.getElementById('desc_prod').value = producto.desc_prod;
            document.getElementById('cantidad_prod').value = producto.cantidad_prod;
            document.getElementById('precio').value = producto.precio;
            document.getElementById('estado').value = producto.estado;
            llenarSelect('cod_proveedor', proveedores, 'cod_proveedor', 'nombre_prov', producto.cod_proveedor);
            llenarSelect('cod_categoria', categorias, 'cod_categoria', 'nombre_categorias', producto.cod_categoria);
        }
        document.getElementById('productoForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
                cod_proveedor: document.getElementById('cod_proveedor').value,
                cod_categoria: document.getElementById('cod_categoria').value,
                nombre_producto: document.getElementById('nombre_producto').value,
                desc_prod: document.getElementById('desc_prod').value,
                cantidad_prod: parseInt(document.getElementById('cantidad_prod').value),
                precio: parseFloat(document.getElementById('precio').value),
                estado: parseInt(document.getElementById('estado').value)
            };
            if (data.cantidad_prod < 0 || data.cantidad_prod > 250) { DemoApp.showAlert('error', '¡Error!', 'La cantidad debe estar entre 0 y 250'); return; }
            const result = DemoApp.actualizarProducto(cod, data);
            if (result.success) { DemoApp.showToast('success', '¡Éxito!', 'Producto actualizado exitosamente'); setTimeout(() => { window.location.href = 'productos.html'; }, 1000); }
            else { DemoApp.showAlert('error', '¡Error!', 'Error al actualizar el producto: ' + result.mensaje); }
        });
        function cerrarSesion() {
            Swal.fire({ title: '¿Cerrar sesión?', text: '¿Estás seguro de que deseas salir?', icon: 'question',
                showCancelButton: true, confirmButtonColor: '#0d6efd', cancelButtonColor: '#6c757d',
                confirmButtonText: 'Sí, cerrar sesión', cancelButtonText: 'Cancelar'
            }).then((r) => { if (r.isConfirmed) DemoApp.logout(); });
        }
    </script>
</body>
</html>
