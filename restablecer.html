<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Farmacia Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-header bg-warning text-dark text-center py-4">
                        <i class="bi bi-key-fill fs-1"></i>
                        <h3 class="mt-2 mb-0">Restablecer Contraseña</h3>
                        <p class="mb-0">Sistema Farmacia - Demo</p>
                    </div>
                    <div class="card-body p-4">
                        <div class="alert alert-info mb-4">
                            <i class="bi bi-info-circle-fill me-2"></i>
                            Ingresa tu usuario y tu nueva contraseña para restablecerla.
                        </div>
                        <form id="restablecerForm">
                            <div class="mb-3">
                                <label for="usuario" class="form-label">Usuario</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                                    <input type="text" class="form-control" id="usuario" name="usuario"
                                        placeholder="Ingresa tu usuario" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="contrasena_nueva" class="form-label">Nueva Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                    <input type="password" class="form-control" id="contrasena_nueva"
                                        placeholder="Mínimo 6 caracteres" required minlength="6" maxlength="20">
                                </div>
                                <small class="text-muted">Entre 6 y 20 caracteres</small>
                            </div>
                            <div class="mb-3">
                                <label for="contrasena_confirmacion" class="form-label">Confirmar Nueva Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                    <input type="password" class="form-control" id="contrasena_confirmacion"
                                        placeholder="Repite tu nueva contraseña" required minlength="6" maxlength="20">
                                </div>
                            </div>
                            <div class="d-grid gap-2 mb-3">
                                <button type="submit" class="btn btn-warning btn-lg">
                                    <i class="bi bi-key-fill me-2"></i>Restablecer Contraseña
                                </button>
                            </div>
                        </form>
                        <hr>
                        <div class="text-center">
                            <p class="mb-0">
                                ¿Recordaste tu contraseña?
                                <a href="login.html" class="text-decoration-none">
                                    <i class="bi bi-box-arrow-in-right me-1"></i>Inicia sesión aquí
                                </a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/app.js"></script>

</body>
</html>
