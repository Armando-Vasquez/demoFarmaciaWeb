<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Farmacia Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html"><i class="bi bi-heart-pulse-fill"></i> Sistema Farmacia</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="productos.html"><i class="bi bi-box-seam"></i> Productos</a></li>
                    <li class="nav-item"><a class="nav-link" href="categorias.html"><i class="bi bi-tags"></i> Categorías</a></li>
                    <li class="nav-item"><a class="nav-link" href="proveedores.html"><i class="bi bi-truck"></i> Proveedores</a></li>
                </ul>
            </div>
            <div class="d-flex align-items-center">
                <span class="text-white me-3"><i class="bi bi-person-circle"></i> <span id="userName"></span></span>
                <button class="btn btn-outline-light" onclick="cerrarSesion()"><i class="bi bi-box-arrow-right"></i> Cerrar Sesión</button>
            </div>
        </div>
    </nav>
    <div class="m-4">
        <div class="d-flex justify-content-between align-items-center mb-4"><h1>Lista de Productos</h1></div>
        <div class="row mb-3">
            <div class="col-md-3"><a href="producto-crear.html" class="btn btn-primary"><i class="bi bi-plus-circle"></i> Nuevo Producto</a></div>
            <div class="col-md-3">
                <div class="d-flex">
                    <select id="estadoFilter" class="form-select me-2">
                        <option value="">Todos los estados</option>
                        <option value="1">Activo</option>
                        <option value="0">Inactivo</option>
                    </select>
                    <button class="btn btn-info" onclick="filtrarEstado()"><i class="bi bi-filter"></i> Filtrar</button>
                </div>
            </div>
            <div class="col-md-6">
                <div class="d-flex">
                    <input type="text" id="searchInput" class="form-control me-2" placeholder="Buscar por código de producto">
                    <button class="btn btn-success me-2" onclick="buscar()"><i class="bi bi-search"></i> Buscar</button>
                    <button class="btn btn-secondary" onclick="limpiar()"><i class="bi bi-x-circle"></i> Limpiar</button>
                </div>
            </div>
        </div>
        <div id="searchAlert"></div>
        <table class="table table-striped table-hover mt-3">
            <thead class="table-dark">
                <tr><th>Código</th><th>Nombre</th><th>Descripción</th><th>Precio</th><th>Stock</th><th>Estado</th><th>Categoría</th><th>Proveedor</th><th>Acciones</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <footer class="bg-light text-center py-3 mt-auto"><h6>Programadores S.A de C.V</h6></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/app.js"></script>
    <script>
        DemoApp.requireAuth();
        document.getElementById('userName').textContent = DemoApp.getCurrentUser() || 'Usuario';

        function renderTable(productos) {
            const tbody = document.getElementById('tableBody');
            const cats = DemoApp.getCategorias();
            const provs = DemoApp.getProveedores();
            if (productos.length === 0) { tbody.innerHTML = '<tr><td colspan="9" class="text-center">No hay productos registrados</td></tr>'; return; }
            tbody.innerHTML = productos.map(p => {
                const cat = cats.find(c => c.cod_categoria === p.cod_categoria);
                const prov = provs.find(pr => pr.cod_proveedor === p.cod_proveedor);
                return `<tr>
                    <td>${p.cod_producto}</td>
                    <td>${p.nombre_producto}</td>
                    <td>${p.desc_prod}</td>
                    <td>$${parseFloat(p.precio).toFixed(2)}</td>
                    <td>${p.cantidad_prod}</td>
                    <td>${p.estado == 1 ? 'Activo' : 'Inactivo'}</td>
                    <td>${cat ? cat.nombre_categorias : p.cod_categoria}</td>
                    <td>${prov ? prov.nombre_prov : p.cod_proveedor}</td>
                    <td>
                        <a href="producto-editar.html?cod=${p.cod_producto}" class="btn btn-sm btn-success"><i class="bi bi-pencil-square"></i> Editar</a>
                        <button class="btn btn-sm btn-danger" onclick="eliminar('${p.cod_producto}')"><i class="bi bi-trash"></i> Eliminar</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function buscar() {
            const cod = document.getElementById('searchInput').value.trim().toUpperCase();
            const prods = DemoApp.getProductos();
            const alertDiv = document.getElementById('searchAlert');
            if (!cod) { alertDiv.innerHTML = ''; renderTable(prods); return; }
            const result = prods.filter(p => p.cod_producto === cod);
            alertDiv.innerHTML = result.length > 0
                ? '<div class="alert alert-info">Mostrando resultado para el código: <strong>' + cod + '</strong></div>'
                : '<div class="alert alert-warning">No se encontró ningún producto con el código: <strong>' + cod + '</strong></div>';
            renderTable(result);
        }

        function filtrarEstado() {
            const estado = document.getElementById('estadoFilter').value;
            document.getElementById('searchInput').value = '';
            document.getElementById('searchAlert').innerHTML = '';
            renderTable(estado === '' ? DemoApp.getProductos() : DemoApp.getProductosPorEstado(estado));
        }

        function limpiar() { document.getElementById('searchInput').value = ''; document.getElementById('estadoFilter').value = ''; document.getElementById('searchAlert').innerHTML = ''; renderTable(DemoApp.getProductos()); }

        async function eliminar(cod) {
            const confirmed = await DemoApp.confirmDelete();
            if (!confirmed) return;
            const result = DemoApp.eliminarProducto(cod);
            if (result.success) { DemoApp.showToast('success', '¡Éxito!', 'Producto eliminado exitosamente'); limpiar(); }
            else { DemoApp.showAlert('error', '¡Error!', result.mensaje); }
        }

        function cerrarSesion() {
            Swal.fire({ title: '¿Cerrar sesión?', text: '¿Estás seguro de que deseas salir?', icon: 'question',
                showCancelButton: true, confirmButtonColor: '#0d6efd', cancelButtonColor: '#6c757d',
                confirmButtonText: 'Sí, cerrar sesión', cancelButtonText: 'Cancelar'
            }).then((r) => { if (r.isConfirmed) DemoApp.logout(); });
        }
        renderTable(DemoApp.getProductos());
    </script>
</body>
</html>
