<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proveedores - Farmacia Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html"><i class="bi bi-heart-pulse-fill"></i> Sistema Farmacia</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="productos.html"><i class="bi bi-box-seam"></i> Productos</a></li>
                    <li class="nav-item"><a class="nav-link" href="categorias.html"><i class="bi bi-tags"></i> Categorías</a></li>
                    <li class="nav-item"><a class="nav-link active" href="proveedores.html"><i class="bi bi-truck"></i> Proveedores</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="m-4">
        <div class="d-flex justify-content-between align-items-center mb-4"><h1>Lista de Proveedores</h1></div>
        <div class="row mb-3">
            <div class="col-md-6">
                <a href="proveedor-crear.html" class="btn btn-primary"><i class="bi bi-plus-circle"></i> Nuevo Proveedor</a>
            </div>
            <div class="col-md-6">
                <div class="d-flex">
                    <input type="text" id="searchInput" class="form-control me-2" placeholder="Buscar por código de proveedor">
                    <button class="btn btn-success me-2" onclick="buscar()"><i class="bi bi-search"></i> Buscar</button>
                    <button class="btn btn-secondary" onclick="limpiar()"><i class="bi bi-x-circle"></i> Limpiar</button>
                </div>
            </div>
        </div>
        <div id="searchAlert"></div>
        <table class="table table-striped table-hover mt-3">
            <thead class="table-dark">
                <tr><th>Código</th><th>Nombre</th><th>Dirección</th><th>Teléfono</th><th>Contacto</th><th>Correo</th><th>Comentarios</th><th>Acciones</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <footer class="bg-light text-center py-3 mt-auto"><h6>Programadores S.A de C.V</h6></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/app.js"></script>
    <script>
        function renderTable(proveedores) {
            const tbody = document.getElementById('tableBody');
            if (proveedores.length === 0) { tbody.innerHTML = '<tr><td colspan="8" class="text-center">No hay proveedores registrados</td></tr>'; return; }
            tbody.innerHTML = proveedores.map(p => `<tr>
                <td>${p.cod_proveedor}</td><td>${p.nombre_prov}</td><td>${p.direccion}</td>
                <td>${p.telefono}</td><td>${p.nombreContacto}</td><td>${p.correo}</td>
                <td>${p.comentarios || '-'}</td>
                <td><a href="proveedor-editar.html?cod=${p.cod_proveedor}" class="btn btn-sm btn-success"><i class="bi bi-pencil-square"></i> Editar</a></td>
            </tr>`).join('');
        }
        function buscar() {
            const cod = document.getElementById('searchInput').value.trim().toUpperCase();
            const provs = DemoApp.getProveedores();
            const alertDiv = document.getElementById('searchAlert');
            if (!cod) { alertDiv.innerHTML = ''; renderTable(provs); return; }
            const result = provs.filter(p => p.cod_proveedor === cod);
            alertDiv.innerHTML = result.length > 0
                ? '<div class="alert alert-info">Mostrando resultado para el código: <strong>' + cod + '</strong></div>'
                : '<div class="alert alert-warning">No se encontró ningún proveedor con el código: <strong>' + cod + '</strong></div>';
            renderTable(result);
        }
        function limpiar() { document.getElementById('searchInput').value = ''; document.getElementById('searchAlert').innerHTML = ''; renderTable(DemoApp.getProveedores()); }
        renderTable(DemoApp.getProveedores());
    </script>
</body>
</html>
