<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Categoría - Farmacia Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html"><i class="bi bi-heart-pulse-fill"></i> Sistema Farmacia</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="productos.html"><i class="bi bi-box-seam"></i> Productos</a></li>
                    <li class="nav-item"><a class="nav-link" href="categorias.html"><i class="bi bi-tags"></i> Categorías</a></li>
                    <li class="nav-item"><a class="nav-link" href="proveedores.html"><i class="bi bi-truck"></i> Proveedores</a></li>
                </ul>
            </div>
            <div class="d-flex align-items-center">
                <span class="text-white me-3"><i class="bi bi-person-circle"></i> <span id="userName"></span></span>
                <button class="btn btn-outline-light" onclick="cerrarSesion()"><i class="bi bi-box-arrow-right"></i> Cerrar Sesión</button>
            </div>
        </div>
    </nav>
    <div class="m-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white"><h4 class="mb-0"><i class="bi bi-plus-circle"></i> Nueva Categoría</h4></div>
                    <div class="card-body">
                        <form id="categoriaForm">
                            <div class="mb-3">
                                <label for="cod_categoria" class="form-label">Código <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="cod_categoria" name="cod_categoria"
                                    placeholder="El código debe tener exactamente 5 caracteres. Ejemplo: CT001"
                                    minlength="5" maxlength="5" required pattern=".{5,5}"
                                    oninput="this.value = this.value.toUpperCase()">
                            </div>
                            <div class="mb-3">
                                <label for="nombre_categorias" class="form-label">Nombre <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="nombre_categorias" name="nombre_categorias" required>
                            </div>
                            <div class="mb-3">
                                <label for="desc_categ" class="form-label">Descripción <span class="text-danger">*</span></label>
                                <textarea class="form-control" id="desc_categ" name="desc_categ" rows="3" required></textarea>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Guardar</button>
                                <a href="categorias.html" class="btn btn-secondary"><i class="bi bi-x-circle"></i> Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="bg-light text-center py-3 mt-auto"><h6>Programadores S.A de C.V</h6></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/app.js"></script>
    <script>
        DemoApp.requireAuth();
        document.getElementById('userName').textContent = DemoApp.getCurrentUser() || 'Usuario';
        document.getElementById('categoriaForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
                cod_categoria: document.getElementById('cod_categoria').value,
                nombre_categorias: document.getElementById('nombre_categorias').value,
                desc_categ: document.getElementById('desc_categ').value
            };
            const result = DemoApp.crearCategoria(data);
            if (result.success) { DemoApp.showToast('success', '¡Éxito!', 'Categoría creada exitosamente'); setTimeout(() => { window.location.href = 'categorias.html'; }, 1000); }
            else if (result.mensaje.includes('ya existe')) { DemoApp.showAlert('error', '¡Error!', 'El código de categoría ya existe.'); }
            else { DemoApp.showAlert('error', '¡Error!', result.mensaje); }
        });
        function cerrarSesion() {
            Swal.fire({ title: '¿Cerrar sesión?', text: '¿Estás seguro de que deseas salir?', icon: 'question',
                showCancelButton: true, confirmButtonColor: '#0d6efd', cancelButtonColor: '#6c757d',
                confirmButtonText: 'Sí, cerrar sesión', cancelButtonText: 'Cancelar'
            }).then((r) => { if (r.isConfirmed) DemoApp.logout(); });
        }
    </script>
</body>
</html>
