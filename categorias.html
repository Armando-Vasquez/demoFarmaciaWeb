<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorías - Farmacia Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html"><i class="bi bi-heart-pulse-fill"></i> Sistema Farmacia</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="productos.html"><i class="bi bi-box-seam"></i> Productos</a></li>
                    <li class="nav-item"><a class="nav-link active" href="categorias.html"><i class="bi bi-tags"></i> Categorías</a></li>
                    <li class="nav-item"><a class="nav-link" href="proveedores.html"><i class="bi bi-truck"></i> Proveedores</a></li>
                </ul>
            </div>
<!--             <div class="d-flex align-items-center">
                <span class="text-white me-3"><i class="bi bi-person-circle"></i> <span id="userName"></span></span>
                <button class="btn btn-outline-light" onclick="cerrarSesion()"><i class="bi bi-box-arrow-right"></i> Cerrar Sesión</button>
            </div> -->
        </div>
    </nav>
    <div class="m-4">
        <div class="d-flex justify-content-between align-items-center mb-4"><h1>Lista de Categorías</h1></div>
        <div class="row mb-3">
            <div class="col-md-6">
                <a href="categoria-crear.html" class="btn btn-primary"><i class="bi bi-plus-circle"></i> Nueva Categoría</a>
            </div>
            <div class="col-md-6">
                <div class="d-flex">
                    <input type="text" id="searchInput" class="form-control me-2" placeholder="Buscar por código de categoria">
                    <button class="btn btn-success me-2" onclick="buscar()"><i class="bi bi-search"></i> Buscar</button>
                    <button class="btn btn-secondary" onclick="limpiar()"><i class="bi bi-x-circle"></i> Limpiar</button>
                </div>
            </div>
        </div>
        <div id="searchAlert"></div>
        <table class="table table-striped table-hover mt-3">
            <thead class="table-dark">
                <tr><th>Código</th><th>Nombre</th><th>Descripción</th><th>Acciones</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <footer class="bg-light text-center py-3 mt-auto"><h6>Programadores S.A de C.V</h6></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/app.js"></script>
    <script>
/*         DemoApp.requireAuth();
        document.getElementById('userName').textContent = DemoApp.getCurrentUser() || 'Usuario'; */

        function renderTable(categorias) {
            const tbody = document.getElementById('tableBody');
            if (categorias.length === 0) { tbody.innerHTML = '<tr><td colspan="4" class="text-center">No hay categorías registradas</td></tr>'; return; }
            tbody.innerHTML = categorias.map(c => `<tr>
                <td>${c.cod_categoria}</td>
                <td>${c.nombre_categorias}</td>
                <td>${c.desc_categ}</td>
                <td>
                    <a href="categoria-editar.html?cod=${c.cod_categoria}" class="btn btn-sm btn-success"><i class="bi bi-pencil-square"></i> Editar</a>
                    <button class="btn btn-sm btn-danger" onclick="eliminar('${c.cod_categoria}')"><i class="bi bi-trash"></i> Eliminar</button>
                </td>
            </tr>`).join('');
        }

        function buscar() {
            const cod = document.getElementById('searchInput').value.trim().toUpperCase();
            const cats = DemoApp.getCategorias();
            const alertDiv = document.getElementById('searchAlert');
            if (!cod) { alertDiv.innerHTML = ''; renderTable(cats); return; }
            const result = cats.filter(c => c.cod_categoria === cod);
            alertDiv.innerHTML = result.length > 0
                ? '<div class="alert alert-info">Mostrando resultado para el código: <strong>' + cod + '</strong></div>'
                : '<div class="alert alert-warning">No se encontró ninguna categoría con el código: <strong>' + cod + '</strong></div>';
            renderTable(result);
        }

        function limpiar() { document.getElementById('searchInput').value = ''; document.getElementById('searchAlert').innerHTML = ''; renderTable(DemoApp.getCategorias()); }

        async function eliminar(cod) {
            const confirmed = await DemoApp.confirmDelete();
            if (!confirmed) return;
            const result = DemoApp.eliminarCategoria(cod);
            if (result.success) { DemoApp.showToast('success', '¡Éxito!', 'Categoría eliminada exitosamente'); limpiar(); }
            else if (result.mensaje.includes('productos')) { DemoApp.showAlert('warning', '¡Advertencia!', 'No se ha podido eliminar la categoría porque corresponde a un producto.'); }
            else { DemoApp.showAlert('error', '¡Error!', result.mensaje); }
        }

        function cerrarSesion() {
            Swal.fire({ title: '¿Cerrar sesión?', text: '¿Estás seguro de que deseas salir?', icon: 'question',
                showCancelButton: true, confirmButtonColor: '#0d6efd', cancelButtonColor: '#6c757d',
                confirmButtonText: 'Sí, cerrar sesión', cancelButtonText: 'Cancelar'
            }).then((r) => { if (r.isConfirmed) DemoApp.logout(); });
        }
        renderTable(DemoApp.getCategorias());
    </script>
</body>
</html>
