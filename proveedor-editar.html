<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Proveedor - Farmacia Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html"><i class="bi bi-heart-pulse-fill"></i> Sistema Farmacia</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="productos.html"><i class="bi bi-box-seam"></i> Productos</a></li>
                    <li class="nav-item"><a class="nav-link" href="categorias.html"><i class="bi bi-tags"></i> Categorías</a></li>
                    <li class="nav-item"><a class="nav-link" href="proveedores.html"><i class="bi bi-truck"></i> Proveedores</a></li>
                </ul>
            </div>
            <div class="d-flex align-items-center">
                <span class="text-white me-3"><i class="bi bi-person-circle"></i> <span id="userName"></span></span>
                <button class="btn btn-outline-light" onclick="cerrarSesion()"><i class="bi bi-box-arrow-right"></i> Cerrar Sesión</button>
            </div>
        </div>
    </nav>
    <div class="m-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-success text-dark"><h4 class="mb-0"><i class="bi bi-pencil-square"></i> Editar Proveedor</h4></div>
                    <div class="card-body">
                        <form id="proveedorForm">
                            <div class="mb-3">
                                <label for="cod_proveedor" class="form-label">Código</label>
                                <input type="text" class="form-control" id="cod_proveedor" disabled>
                                <small class="text-muted">El código no se puede modificar</small>
                            </div>
                            <div class="mb-3"><label for="nombre_prov" class="form-label">Nombre <span class="text-danger">*</span></label><input type="text" class="form-control" id="nombre_prov" name="nombre_prov" required></div>
                            <div class="mb-3"><label for="direccion" class="form-label">Dirección <span class="text-danger">*</span></label><input type="text" class="form-control" id="direccion" name="direccion" required></div>
                            <div class="mb-3"><label for="telefono" class="form-label">Teléfono <span class="text-danger">*</span></label><input type="text" class="form-control" id="telefono" name="telefono" placeholder="Ejemplo: 0000-0000" minlength="9" maxlength="9" required></div>
                            <div class="mb-3"><label for="nombreContacto" class="form-label">Nombre de Contacto <span class="text-danger">*</span></label><input type="text" class="form-control" id="nombreContacto" name="nombreContacto" required></div>
                            <div class="mb-3"><label for="correo" class="form-label">Correo <span class="text-danger">*</span></label><input type="email" class="form-control" id="correo" name="correo" required></div>
                            <div class="mb-3"><label for="comentarios" class="form-label">Comentarios</label><textarea class="form-control" id="comentarios" name="comentarios" rows="3"></textarea></div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success"><i class="bi bi-save"></i> Actualizar</button>
                                <a href="proveedores.html" class="btn btn-secondary"><i class="bi bi-x-circle"></i> Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="bg-light text-center py-3 mt-auto"><h6>Programadores S.A de C.V</h6></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/app.js"></script>
    <script>
        DemoApp.requireAuth();
        document.getElementById('userName').textContent = DemoApp.getCurrentUser() || 'Usuario';
        const params = new URLSearchParams(window.location.search);
        const cod = params.get('cod');
        if (!cod) { window.location.href = 'proveedores.html'; }
        const proveedor = DemoApp.getProveedor(cod);
        if (!proveedor) { DemoApp.showAlert('error', '¡Error!', 'Proveedor no encontrado'); setTimeout(() => { window.location.href = 'proveedores.html'; }, 1500); }
        else {
            document.getElementById('cod_proveedor').value = proveedor.cod_proveedor;
            document.getElementById('nombre_prov').value = proveedor.nombre_prov;
            document.getElementById('direccion').value = proveedor.direccion;
            document.getElementById('telefono').value = proveedor.telefono;
            document.getElementById('nombreContacto').value = proveedor.nombreContacto;
            document.getElementById('correo').value = proveedor.correo;
            document.getElementById('comentarios').value = proveedor.comentarios || '';
        }
        document.getElementById('proveedorForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
                nombre_prov: document.getElementById('nombre_prov').value,
                direccion: document.getElementById('direccion').value,
                telefono: document.getElementById('telefono').value,
                nombreContacto: document.getElementById('nombreContacto').value,
                correo: document.getElementById('correo').value,
                comentarios: document.getElementById('comentarios').value
            };
            const result = DemoApp.actualizarProveedor(cod, data);
            if (result.success) { DemoApp.showToast('success', '¡Éxito!', 'Proveedor actualizado exitosamente'); setTimeout(() => { window.location.href = 'proveedores.html'; }, 1000); }
            else { DemoApp.showAlert('error', '¡Error!', 'Error al actualizar el proveedor: ' + result.mensaje); }
        });
        function cerrarSesion() {
            Swal.fire({ title: '¿Cerrar sesión?', text: '¿Estás seguro de que deseas salir?', icon: 'question',
                showCancelButton: true, confirmButtonColor: '#0d6efd', cancelButtonColor: '#6c757d',
                confirmButtonText: 'Sí, cerrar sesión', cancelButtonText: 'Cancelar'
            }).then((r) => { if (r.isConfirmed) DemoApp.logout(); });
        }
    </script>
</body>
</html>
