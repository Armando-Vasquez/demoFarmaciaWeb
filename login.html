<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Farmacia Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center py-4">
                        <i class="bi bi-heart-pulse-fill fs-1"></i>
                        <h3 class="mt-2 mb-0">Iniciar Sesión</h3>
                        <p class="mb-0">Sistema Farmacia - Demo</p>
                    </div>
                    <div class="card-body p-4">
                        <div class="alert alert-info text-center small">
                            <i class="bi bi-info-circle-fill me-1"></i>
                            Demo: admin / admin123
                        </div>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="usuario" class="form-label">Usuario</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                                    <input type="text" class="form-control" id="usuario" name="usuario"
                                        placeholder="Ingresa tu usuario" required autocomplete="username">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="contrasena" class="form-label">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                    <input type="password" class="form-control" id="contrasena" name="contrasena"
                                        placeholder="Ingresa tu contraseña" required autocomplete="current-password">
                                </div>
                            </div>
                            <div class="d-grid gap-2 mb-3">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
                                </button>
                            </div>
                        </form>
<!--                         <hr>
                        <div class="text-center">
                            <p class="mb-2">
                                <a href="restablecer.html" class="text-decoration-none">
                                    <i class="bi bi-key-fill me-1"></i>¿Olvidaste tu contraseña?
                                </a>
                            </p>
                            <p class="mb-0">
                                ¿No tienes cuenta?
                                <a href="registro.html" class="text-decoration-none">
                                    <i class="bi bi-person-plus-fill me-1"></i>Regístrate aquí
                                </a>
                            </p>
                        </div> -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/app.js"></script>
    <script>
        DemoApp.redirectIfAuth();

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const usuario = document.getElementById('usuario').value;
            const contrasena = document.getElementById('contrasena').value;
            const result = DemoApp.login(usuario, contrasena);
            if (result.success) {
                DemoApp.showToast('success', '¡Bienvenido!', 'Has iniciado sesión correctamente');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
            } else {
                DemoApp.showAlert('error', '¡Error!', result.mensaje);
            }
        });
    </script>
</body>
</html>
